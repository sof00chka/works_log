{% extends "index.html" %}

{% block content %}
<div style="text-align: center;">
    <h2>Размещение по каютам</h2>
    {% for i in people %}
        {% if loop.first %}
            <p>{{ i }} - Каюта № {{ loop.index }} - капитан корабля</p>
        {% else %}
            <p>{{ i }} - Каюта № {{ loop.index }}</p>
        {% endif %}
    {% endfor %}
</div>
{% endblock %}
